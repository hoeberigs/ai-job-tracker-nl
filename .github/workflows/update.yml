name: Daily AI Job Tracker Update

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 08:00 UTC (09:00 CET)
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 rich

      - name: Run scraper and update dashboard
        run: python -m src.main --update

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db docs/
          git diff --staged --quiet || git commit -m "Update job data and dashboard $(date +%Y-%m-%d)"
          git push
